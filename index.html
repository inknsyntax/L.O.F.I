<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L.O.F.I - Learn, Organize, & File Ideas</title>
    <!-- Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="theme-beige">
    <!-- BACKGROUND LAYER -->
    <div id="app-bg"></div>

    <div class="app-layout">
        <!-- TOP NAVIGATION BAR (Categories) -->
        <nav class="glass-panel top-bar">
            <div class="brand">
                <i class="fas fa-cloud-moon"></i> L.O.F.I
            </div>
            
            <div class="top-tabs">
                <button class="top-btn" onclick="AppUI.switchCategory('study')"><i class="fas fa-book-open"></i> Study</button>
                <button class="top-btn" onclick="AppUI.switchCategory('utilities')"><i class="fas fa-tools"></i> Utilities</button>
                <button class="top-btn" onclick="AppUI.switchCategory('sound')"><i class="fas fa-music"></i> Sound</button>
                <button class="top-btn" onclick="AppUI.switchCategory('other')"><i class="fas fa-sliders-h"></i> Other</button>
            </div>

            <!-- Time Display -->
            <div class="top-controls" style="display:flex; align-items:center;">
                <div id="clock-display" style="font-family:'Fira Code'; margin-right:15px; font-weight:bold;">00:00</div>
            </div>
        </nav>

        <div class="work-area">
            <!-- SIDE NAVIGATION (Contextual Modules) -->
            <aside class="glass-panel side-bar">
                <div id="side-nav-content">
                    <!-- Dynamic buttons injected here based on Category -->
                </div>
            </aside>

            <!-- MAIN CONTENT AREA (Functional Views) -->
            <main class="glass-panel main-view">
                <div id="module-content">
                    <!-- Dynamic Content Injected Here -->
                </div>
            </main>
        </div>
    </div>
    
    <!-- LOAD MODULES (Order Matters) -->
    <script src="js/state.js"></script>
    <script src="js/data.js"></script>
    <script src="js/logic.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
